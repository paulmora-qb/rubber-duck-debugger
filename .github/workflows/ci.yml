name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ── Code Quality ──────────────────────────────────────────────────────────────

jobs:
  lint-ruff:
    name: "Code Quality / Ruff lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/ruff-action@v3
        with:
          version: "0.15.11"

  format-ruff:
    name: "Code Quality / Ruff format"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/ruff-action@v3
        with:
          version: "0.15.11"
          args: "format --check --diff"

  pre-commit-eof:
    name: "Code Quality / End-of-file fixer"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-uv
      - name: Check end-of-file
        run: uv run --locked pre-commit run end-of-file-fixer --all-files

  pre-commit-whitespace:
    name: "Code Quality / Trailing whitespace"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-uv
      - name: Check trailing whitespace
        run: uv run --locked pre-commit run trailing-whitespace --all-files

  lock-file:
    name: "Code Quality / uv.lock up to date"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-uv
      - name: Check uv.lock is up to date
        run: uv lock --check

# ── Tests ─────────────────────────────────────────────────────────────────────

  test-pipelines-company-financials:
    name: "Tests / Pipelines / company_financials"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-uv
      - run: uv run --locked pytest tests/pipelines/company_financials

