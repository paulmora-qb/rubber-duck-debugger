name: "Setup Python and uv"
description: "Setup Python from pyproject.toml and install uv with caching"

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.13"

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
