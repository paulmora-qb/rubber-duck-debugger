# Read-side: existing data fed into the ingest node as lazy loaders.
# Uses NullablePartitionedDataset so the first run (empty dir) returns {} gracefully.
raw_earnings_history_existing:
  type: rdd.datasets.nullable_partitioned.NullablePartitionedDataset
  path: ${globals:data_dir}raw/earnings_history
  dataset:
    type: pandas.ParquetDataset
  filename_suffix: ".parquet"
  metadata:
    kedro-viz:
      layer: raw

# Write-side: merged output saved back to the same path.
raw_earnings_history:
  type: kedro_datasets.partitions.PartitionedDataset
  path: ${globals:data_dir}raw/earnings_history
  dataset:
    type: pandas.ParquetDataset
  filename_suffix: ".parquet"
  metadata:
    kedro-viz:
      layer: raw
    pandera:
      schema:
        type: python.model
        object_path: rdd.schemas.earnings_history.EarningsHistorySchema
