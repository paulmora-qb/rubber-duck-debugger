# ── Donchian Breakout ─────────────────────────────────────────────────────────

donchian_breakout.holdings:
  type: kedro_datasets.partitions.PartitionedDataset
  path: ${globals:data_dir}portfolio/holdings/donchian_breakout
  dataset:
    type: pandas.ParquetDataset
  filename_suffix: ".parquet"
  metadata:
    kedro-viz:
      layer: portfolio
    pandera:
      schema:
        type: python.model
        object_path: rdd.schemas.portfolio_holdings.PortfolioHoldingsSchema

donchian_breakout.holdings_existing:
  type: rdd.datasets.nullable_partitioned.NullablePartitionedDataset
  path: ${globals:data_dir}portfolio/holdings/donchian_breakout
  dataset:
    type: pandas.ParquetDataset
  filename_suffix: ".parquet"
  metadata:
    kedro-viz:
      layer: portfolio

