# ── ai_fundamental_screen_monthly ────────────────────────────────────────────

ai_fundamental_screen_monthly_ticker_scores:
  type: kedro_datasets.json.JSONDataset
  filepath: "${globals:data_dir}portfolio/ai_fundamental_screen_monthly/ticker_scores.json"

ai_fundamental_screen_monthly_allocation:
  type: kedro_datasets.json.JSONDataset
  filepath: "${globals:data_dir}portfolio/ai_fundamental_screen_monthly/allocation.json"

ai_fundamental_screen_monthly_trades:
  type: kedro_datasets.json.JSONDataset
  filepath: "${globals:data_dir}portfolio/ai_fundamental_screen_monthly/trades.json"

ai_fundamental_screen_monthly.holdings:
  type: kedro_datasets.partitions.PartitionedDataset
  path: ${globals:data_dir}portfolio/holdings/ai_fundamental_screen_monthly
  dataset:
    type: pandas.ParquetDataset
  filename_suffix: ".parquet"
  metadata:
    kedro-viz:
      layer: portfolio
    pandera:
      schema:
        type: python.model
        object_path: rdd.schemas.portfolio_holdings.PortfolioHoldingsSchema

ai_fundamental_screen_monthly.holdings_existing:
  type: rdd.datasets.nullable_partitioned.NullablePartitionedDataset
  path: ${globals:data_dir}portfolio/holdings/ai_fundamental_screen_monthly
  dataset:
    type: pandas.ParquetDataset
  filename_suffix: ".parquet"
  metadata:
    kedro-viz:
      layer: portfolio

