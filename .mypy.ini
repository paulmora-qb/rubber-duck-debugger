[mypy]
python_version = 3.13
strict = true
warn_return_any = true
warn_unused_ignores = true
no_implicit_reexport = true

# Third-party libraries without bundled stubs
[mypy-yfinance.*]
ignore_missing_imports = true

[mypy-finnhub.*]
ignore_missing_imports = true

[mypy-newsapi.*]
ignore_missing_imports = true

[mypy-kedro.*]
ignore_missing_imports = true

[mypy-pandera.*]
ignore_missing_imports = true
